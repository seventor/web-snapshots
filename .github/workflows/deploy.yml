name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  DOMAIN_NAME: grense.land
  SNAPSHOTS_PATH: snapshots

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CDK dependencies
        run: pip install -r cdk/requirements.txt

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: CDK bootstrap
        working-directory: cdk
        run: |
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/us-east-1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/news-screenshots:$IMAGE_TAG .
          docker push $ECR_REGISTRY/news-screenshots:$IMAGE_TAG
          docker tag $ECR_REGISTRY/news-screenshots:$IMAGE_TAG $ECR_REGISTRY/news-screenshots:latest
          docker push $ECR_REGISTRY/news-screenshots:latest

      - name: Deploy with CDK
        working-directory: cdk
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: cdk deploy --all --require-approval never

      - name: Update Lambda image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name news-screenshots \
            --image-uri $ECR_REGISTRY/news-screenshots:$IMAGE_TAG
